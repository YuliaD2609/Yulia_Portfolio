<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arte | Yulia</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .filters {
      display: flex;
      justify-content: center;
      gap: 1rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .filter-btn {
      background: none;
      border: 1px solid var(--color-secondary);
      padding: 0.5rem 1rem;
      border-radius: 20px;
      cursor: pointer;
      font-family: var(--font-main);
      transition: var(--transition-fast);
    }

    .filter-btn:hover,
    .filter-btn.active {
      background-color: var(--color-primary);
      color: white;
      border-color: var(--color-primary);
    }
  </style>
</head>

<body>

  <nav>
    <div class="container nav-container">
      <div class="logo">
        <a href="index.html"><img src="images/me_circle.jpg" alt="Yulia Profile" class="nav-profile-img"></a>
        <a href="index.html">Yulia</a>
      </div>
      <div class="nav-links">
        <a href="about.html">About</a>
        <a href="fotografia.html">Fotografia</a>
        <a href="eventi.html">Eventi</a>
        <a href="arte.html" style="color: var(--color-primary);">Arte</a>
        <a href="scrittura.html">Scrittura</a>
        <a href="progetti.html">Progetti</a>
      </div>
    </div>
  </nav>

  <section class="container" style="margin-top: var(--spacing-lg);">
    <h1 class="fade-in" style="text-align: center;">Arte</h1>
    <p class="fade-in"
      style="text-align: center; max-width: 600px; margin: 0 auto var(--spacing-md); color: var(--color-text-light);">
      Esplorazioni visive, ritratti, la realtà interpretata a modo mio.
    </p>

    <!-- Filters -->
    <div class="filters fade-in">
      <button class="filter-btn active" onclick="filterGallery('disegno')">Disegno</button>
      <button class="filter-btn" onclick="filterGallery('painting')">Pittura</button>
      <button class="filter-btn" onclick="filterGallery('bnw')">Bianco e Nero</button>
      <button class="filter-btn" onclick="filterGallery('unconventional')">Mixed media</button>
    </div>

    <!-- Gallery -->
    <div class="gallery-grid fade-in">
      <!-- Items must have data-category matching filters -->

      <!-- Painting -->
      <div class="gallery-item" data-category="painting">
        <img src="images/art/pittura1.jpg" alt="Pittura 1" loading="lazy">
      </div>

      <div class="gallery-item" data-category="painting">
        <img src="images/art/pittura2.jpg" alt="Pittura 2" loading="lazy">
      </div>

      <div class="gallery-item" data-category="painting">
        <img src="images/art/pittura3.jpg" alt="Pittura 3" loading="lazy">
      </div>

      <!-- Pittura Grid from the second line: 4 per row, keep same height of grid 1 items -->
      <div class="painting-grid-row" style="grid-column: 1 / -1; display: grid; gap: 0.5rem; width: 100%;">
        <div class="gallery-item" data-category="painting" style="background-color: transparent; aspect-ratio: auto;">
          <img src="images/art/pittura4.jpg" alt="Pittura 4" style="object-fit: cover; width: 100%; height: 100%;"
            loading="lazy">
        </div>

        <div class="gallery-item" data-category="painting" style="background-color: transparent; aspect-ratio: auto;">
          <img src="images/art/pittura5.jpg" alt="Pittura 5" style="object-fit: cover; width: 100%; height: 100%;"
            loading="lazy">
        </div>

        <div class="gallery-item" data-category="painting" style="background-color: transparent; aspect-ratio: auto;">
          <img src="images/art/pittura6.jpg" alt="Pittura 6" style="object-fit: cover; width: 100%; height: 100%;"
            loading="lazy">
        </div>

        <div class="gallery-item" data-category="painting" style="background-color: transparent; aspect-ratio: auto;">
          <img src="images/art/pittura7.jpg" alt="Pittura 7" style="object-fit: cover; width: 100%; height: 100%;"
            loading="lazy">
        </div>

        <div class="gallery-item" data-category="painting" style="background-color: transparent; aspect-ratio: auto;">
          <img src="images/art/pittura8.jpg" alt="Pittura 8" style="object-fit: cover; width: 100%; height: 100%;"
            loading="lazy">
        </div>

        <div class="gallery-item pittura-span-2" data-category="painting"
          style="background-color: transparent; aspect-ratio: auto; height: 100%; display: flex; align-items: flex-start; justify-content: flex-start;">
          <img src="images/art/pittura9.jpg" alt="Pittura 9"
            style="object-fit: contain; object-position: top left; width: 75%; height: 100%;" loading="lazy">
        </div>
      </div>

      <!-- B&W -->
      <div class="gallery-item" data-category="bnw">
        <img src="images/art/bn1.jpg" alt="Bianco e Nero 1" style="object-position: center 50%;" loading="lazy">
      </div>

      <div class="gallery-item" data-category="bnw">
        <img src="images/art/bn2.jpg" alt="Bianco e Nero 2" style="object-position: center 50%;" loading="lazy">
      </div>

      <!-- Unconventional (Mixed Media) - Stacked Layout Matching Doodles -->
      <div class="disegno-wrapper" data-category="unconventional" style="flex-wrap: wrap; justify-content: flex-start;">

        <!-- Stack 1 (2 squares) -->
        <div class="gallery-item stacked disegno-stacked"
          style="background: transparent; border-radius: 0; pointer-events: none;">
          <div style="display: flex; flex-direction: column; gap: var(--spacing-sm); width: 100%; height: 100%;">
            <div class="gallery-sub-item">
              <img src="images/art/mixed1.jpg" alt="Mixed Media 1" loading="lazy">
            </div>
            <div class="gallery-sub-item">
              <img src="images/art/mixed2.jpg" alt="Mixed Media 2" loading="lazy">
            </div>
          </div>
        </div>

        <!-- Stack 2 (2 squares) -->
        <div class="gallery-item stacked disegno-stacked"
          style="background: transparent; border-radius: 0; pointer-events: none;">
          <div style="display: flex; flex-direction: column; gap: var(--spacing-sm); width: 100%; height: 100%;">
            <div class="gallery-sub-item">
              <img src="images/art/mixed3.jpg" alt="Mixed Media 3" loading="lazy">
            </div>
            <div class="gallery-sub-item">
              <img src="images/art/mixed4.jpg" alt="Mixed Media 4" loading="lazy">
            </div>
          </div>
        </div>

        <!-- Vertical Image 1 -->
        <div class="gallery-item mixed-vertical"
          style="height: 100%; display: flex; background: transparent; border-radius: 0;">
          <img src="images/art/mixed5.jpg" alt="Mixed Media 5"
            style="object-fit: contain; width: auto; height: 100%; border-radius: var(--radius-sm);" loading="lazy">
        </div>

        <!-- Vertical Image 2 -->
        <div class="gallery-item mixed-vertical"
          style="height: 100%; display: flex; background: transparent; border-radius: 0;">
          <img src="images/art/mixed6.jpg" alt="Mixed Media 6"
            style="object-fit: contain; width: auto; height: 100%; border-radius: var(--radius-sm);" loading="lazy">
        </div>

      </div>

      <!-- Disegno -->
      <div class="disegno-wrapper" data-category="disegno">
        <div class="gallery-item disegno-standard">
          <img src="images/art/disegno1.jpg" alt="Disegno 1" loading="lazy">
        </div>

        <div class="gallery-item stacked disegno-stacked"
          style="background: transparent; border-radius: 0; pointer-events: none;">
          <div style="display: flex; flex-direction: column; gap: var(--spacing-sm); width: 100%; height: 100%;">
            <div class="gallery-sub-item">
              <img src="images/art/doodle2.jpg" alt="Doodle 2" loading="lazy">
            </div>
            <div class="gallery-sub-item">
              <img src="images/art/doodle3.jpg" alt="Doodle 3" loading="lazy">
            </div>
          </div>
        </div>

        <div class="gallery-item collab-item" style="pointer-events: none; border-radius: 0; background: transparent;">
          <img src="images/art/collab1.jpg" alt="Collaborazione"
            style="pointer-events: auto; border-radius: var(--radius-sm);" loading="lazy">
          <span class="gallery-badge" style="bottom: 15px; right: 15px;">Collaborazione</span>
        </div>
      </div>

    </div>
  </section>

  <footer>
    <div class="container">
      <p>&copy; <span id="year"></span> Yulia. <br> <a href="mailto:yuliadashchuk26@gmail.com"
          style="color: inherit;">yuliadashchuk26@gmail.com</a></p>
      <div style="margin-top: var(--spacing-xs);">
        <a href="https://github.com/YuliaD2609" target="_blank" style="margin: 0 10px;">GitHub</a>
        <a href="https://www.instagram.com/yulia__photography/" target="_blank" style="margin: 0 10px;">Instagram</a>
        <a href="https://www.linkedin.com/in/yulia-dashchuk" target="_blank" style="margin: 0 10px;">LinkedIn</a>
      </div>
    </div>
  </footer>

  <script src="js/gallery.js"></script>
  <script src="js/main.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { filterGallery('disegno'); });
  </script>
</body>

</html>
