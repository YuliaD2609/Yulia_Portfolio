    <div

    <!-- Croazia -->
    <div style="margin-bottom: var(--spacing-md);">
      <h3 style="display: flex; align-items: center; gap: 10px; margin-bottom: 2rem;">

      <div class="viaggi-gallery"

        <!-- Left: croa3 portrait -->
        <div style="overflow: hidden; border-radius: var(--radius-sm); cursor: default; height: 350px;">
          <img src="images/photography/croazia/croa3.jpg" alt="Croazia – museo" loading="lazy"
            style="width: 100%; height: 100%; object-fit: cover; display: block; transition: transform 0.6s ease;"
            onmouseover="this.style.transform='scale(1.03)'" onmouseout="this.style.transform='scale(1)'">
        </div>

        <!-- Right: croa1 + croa2 side by side -->
        <div style="display: flex; flex-direction: row; gap: 6px; height: 350px;">

      </div>
    </div>
